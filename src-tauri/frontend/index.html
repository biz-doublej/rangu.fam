<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>랑구 택틱스</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 1.5rem; height: 100vh;
        background: radial-gradient(120% 120% at 50% 0%, #1e293b 0%, #0f172a 60%, #020617 100%);
        color: #e2e8f0; font-family: system-ui, "Segoe UI", -apple-system, sans-serif; text-align: center;
        -webkit-user-select: none; user-select: none;
      }
      .logo { font-size: 2.4rem; font-weight: 800; letter-spacing: 0.04em;
        background: linear-gradient(90deg, #f43f5e, #fb7185); -webkit-background-clip: text;
        background-clip: text; color: transparent; }
      .sub { font-size: 0.9rem; color: #94a3b8; }
      .spinner { width: 2.5rem; height: 2.5rem; border-radius: 9999px;
        border: 4px solid rgba(244,63,94,0.25); border-top-color: #f43f5e; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      a.manual { font-size: 0.8rem; color: #64748b; text-decoration: underline; }
      a.manual:hover { color: #cbd5e1; }
    </style>
  </head>
  <body>
    <div class="logo">랑구 택틱스</div>
    <div class="spinner" aria-hidden="true"></div>
    <div class="sub">게임 서버에 연결 중…</div>
    <a class="manual" href="#" id="manual">바로 접속이 안 되면 여기를 누르세요</a>
    <script>
      // ── 프로덕션(.exe) 진입점 ───────────────────────────────────────────
      // 이 셸은 SSR(Next standalone) 게임을 직접 번들하지 않고, 실행 중인 게임 서버로 이동한다.
      // ▶ 배포 사이트로 패키징하려면 아래 GAME_URL 을 운영 도메인으로 바꿔라(예: 'https://rangu.fam').
      //   로컬 데모는 `npm run dev`(:3000) + 게임서버(:5080)를 띄운 상태에서 동작한다.
      //   (참고: `npm run tauri:dev` 는 이 파일 대신 tauri.conf 의 devUrl=localhost:3000 을 직접 로드한다.)
      var GAME_URL = 'http://localhost:3000';
      document.getElementById('manual').setAttribute('href', GAME_URL);
      setTimeout(function () { window.location.replace(GAME_URL); }, 600);
    </script>
  </body>
</html>
