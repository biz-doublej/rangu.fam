services:
  postgres:
    image: postgres:16-alpine
    container_name: rangu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set in .env}
      POSTGRES_USER: ${POSTGRES_USER:?set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      TZ: ${TZ:?set in .env}
    ports:
      - "${POSTGRES_PORT:?set in .env}:5432"
    volumes:
      - ${POSTGRES_DATA_DIR:?set in .env}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # MongoDB wire protocol -> PostgreSQL bridge.
  # Keep application code unchanged while data is persisted in PostgreSQL.
  ferretdb:
    image: ghcr.io/ferretdb/ferretdb:2
    container_name: rangu-ferretdb
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      FERRETDB_POSTGRESQL_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "${FERRETDB_PORT:?set in .env}:27017"
